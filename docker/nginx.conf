# Конфиг для чтения собранного HTML5-варианта SICP.
# Кладётся в /etc/nginx/conf.d/default.conf (перекрывает дефолтный сервер).
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    # книга стартует с index.xhtml, а не index.html — без этого nginx
    # не находит индекс и отдаёт 403 на запрос '/'.
    index index.xhtml index.html;

    # дефолтный mime.types в nginx уже знает xhtml->application/xhtml+xml,
    # css, js, svg, png, jpg, woff/woff2 — инклудим его как есть.
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    location / {
        try_files $uri $uri/ =404;
        autoindex on;   # удобно листать разделы книги
    }
}
